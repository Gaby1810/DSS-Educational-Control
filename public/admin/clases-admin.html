<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Clases</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
color:#1f2937;
}

.header{
height:60px;
background:#1e3a8a;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
color:white;
}

.logo{
font-weight:bold;
font-size:14px;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
color:white;
text-decoration:none;
font-size:13px;
}

.container{
padding:25px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.top h2{
font-size:28px;
}

.ciclo{
color:#6366f1;
font-weight:600;
}

.class-list{
display:flex;
flex-direction:column;
gap:18px;
}

.class-card{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.class-header{
display:flex;
justify-content:space-between;
margin-bottom:18px;
}

.class-title{
font-size:18px;
font-weight:600;
margin-bottom:5px;
}

.class-sub{
font-size:13px;
color:#6366f1;
}

.class-actions{
display:flex;
gap:15px;
color:#6b7280;
cursor:pointer;
}

.info-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:18px;
}

.info h4{
font-size:11px;
color:#9ca3af;
margin-bottom:5px;
}

.info p{
font-size:14px;
font-weight:600;
}

.estado{
color:#10b981;
}

.bottom-card{
display:flex;
justify-content:space-between;
align-items:center;
padding-top:15px;
border-top:1px solid #eee;
}

.students{
font-size:13px;
color:#6b7280;
}

.btn{
padding:8px 16px;
border:none;
border-radius:10px;
background:#eef2ff;
color:#4f46e5;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
<i class="fa-solid fa-graduation-cap"></i>
Educational Control
</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Reportes</a>
<a href="#">Administrador</a>
</div>

</div>

<div class="container">

<div class="top">

<h2 id="titulo">
LISTA DE CLASES
</h2>

<div class="ciclo">
Ciclo 2024
</div>

</div>

<div class="class-list" id="clases"></div>

</div>

<script>

fetch("/api/admin/clases",{
credentials:"include"
})
.then(r=>r.json())
.then(data=>{

document.getElementById("titulo")
.innerText=`LISTA DE CLASES (${data.length})`;

let box=document.getElementById("clases");

data.forEach(c=>{

box.innerHTML+=`

<div class="class-card">

<div class="class-header">

<div>

<div class="class-title">
${c.materia}
</div>

<div class="class-sub">
${c.codigo_clase}
</div>

</div>

<div class="class-actions">
<i class="fa-solid fa-pen"></i>
<i class="fa-solid fa-trash"></i>
</div>

</div>

<div class="info-grid">

<div class="info">
<h4>DOCENTE</h4>
<p>${c.docente}</p>
</div>

<div class="info">
<h4>CÓDIGO</h4>
<p>${c.codigo_clase}</p>
</div>

<div class="info">
<h4>GRADO</h4>
<p>${c.grado}</p>
</div>

<div class="info">
<h4>ESTATUS</h4>
<p class="estado">Activa</p>
</div>

</div>

<div class="bottom-card">

<div class="students">
<i class="fa-solid fa-users"></i>
${c.estudiantes} estudiantes
</div>

<button class="btn"
onclick="verClase(${c.id})">
Ver Listado
</button>

</div>

</div>

`;

});

});

function verClase(id){

window.location.href=
`estudiantes-clase-admin.html?id=${id}`;

}

</script>

</body>
</html>
