<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Asistencia</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4fb;
min-height:100vh;
}

.topbar{
background:#0f2c82;
height:90px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.topbar-left{
display:flex;
align-items:center;
gap:15px;
}

.circle-btn{
width:38px;
height:38px;
border-radius:50%;
background:white;
color:#0f2c82;
display:flex;
justify-content:center;
align-items:center;
}

.back-btn{
background:white;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:#0f2c82;
}

.container{
width:92%;
margin:auto;
padding:30px 0 120px;
}

.tools{
margin-bottom:25px;
display:flex;
gap:10px;
}

.tools input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

.btn{
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:white;
}

.btn-present{
background:#16a34a;
}

.btn-absent{
background:#dc2626;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
}

.stat-card h2{
font-size:32px;
color:#0f2c82;
}

.lista{
display:flex;
flex-direction:column;
gap:20px;
}

.student{
background:white;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.student-left{
display:flex;
gap:15px;
align-items:center;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:#2563eb;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:25px;
font-weight:bold;
}

.status{
font-weight:bold;
margin-top:5px;
}

.present{
color:#16a34a;
}

.absent{
color:#dc2626;
}

.actions{
display:flex;
gap:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:75px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottom-nav a{
text-decoration:none;
color:#6b7280;
display:flex;
flex-direction:column;
align-items:center;
}

.bottom-nav a.active{
color:#2563eb;
}

</style>

</head>

<body>

<div class="topbar">

<div class="topbar-left">

<div class="circle-btn">
<i class="fa-solid fa-user-check"></i>
</div>

<h2>Control Asistencia</h2>

</div>

<button
class="back-btn"
onclick="history.back()">

Volver

</button>

</div>

<div class="container">

<div class="tools">

<input
type="date"
id="fecha">

<button
class="btn btn-present"
onclick="cargar()">

Buscar

</button>

</div>

<div class="stats">

<div class="stat-card">
<h2 id="porcentaje">0%</h2>
<p>Asistencia</p>
</div>

<div class="stat-card">
<h2 id="presentes">0</h2>
<p>Presentes</p>
</div>

<div class="stat-card">
<h2 id="ausentes">0</h2>
<p>Ausentes</p>
</div>

<div class="stat-card">
<h2 id="total">0</h2>
<p>Total</p>
</div>

</div>

<div
class="lista"
id="lista">
</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
Inicio
</a>

<a href="clase.html">
<i class="fa-solid fa-book"></i>
Clases
</a>

<a class="active">
<i class="fa-solid fa-users"></i>
Estudiantes
</a>

</div>

<script>

const clase=
new URLSearchParams(
location.search
).get("id");

let estudiantes=[];

document.getElementById(
"fecha"
).value=
new Date()
.toISOString()
.split("T")[0];

async function cargar(){

const fecha=
document.getElementById(
"fecha"
).value;

const r=await fetch(
`/api/asistencia/${clase}?fecha=${fecha}`,
{
credentials:"include"
}
);

const data=
await r.json();

estudiantes=
data.estudiantes;

render();

}

function render(){

const lista=
document.getElementById(
"lista"
);

lista.innerHTML="";

let totalPresentes=0;
let totalAusentes=0;

estudiantes.forEach(e=>{

let estado=
"Sin registrar";

let claseEstado="";

if(Number(e.presente)===1){

estado="Presente";
claseEstado="present";
totalPresentes++;

}

else if(Number(e.presente)===0){

estado="Ausente";
claseEstado="absent";
totalAusentes++;

}

lista.innerHTML+=`

<div class="student">

<div class="student-left">

<div class="avatar">
${e.nombre.charAt(0)}
</div>

<div>

<h2>${e.nombre}</h2>

<div class="status ${claseEstado}">
${estado}
</div>

</div>

</div>

<div class="actions">

<button
class="btn btn-present"
onclick="guardar(${e.id},1)">
✓ Presente
</button>

<button
class="btn btn-absent"
onclick="guardar(${e.id},0)">
✕ Ausente
</button>

</div>

</div>

`;

});

document.getElementById(
"presentes"
).innerHTML=
totalPresentes;

document.getElementById(
"ausentes"
).innerHTML=
totalAusentes;

document.getElementById(
"total"
).innerHTML=
estudiantes.length;

document.getElementById(
"porcentaje"
).innerHTML=

estudiantes.length>0
?
Math.round(
(totalPresentes*100)
/estudiantes.length
)+"%"
:
"0%";

}

async function guardar(
id,
presente
){

const fecha=
document.getElementById(
"fecha"
).value;

await fetch(
"/api/asistencia/guardar",
{
method:"POST",

credentials:"include",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

clase_id:clase,
estudiante_id:id,
presente,
fecha

})

}
);

cargar();

}

cargar();

</script>

</body>
</html>
