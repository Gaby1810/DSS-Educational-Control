<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Estudiantes</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4fb;
min-height:100vh;
}

/* ===== TOPBAR ===== */

.topbar{

background:#0f2c82;
height:90px;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

position:sticky;
top:0;
z-index:100;

}

.topbar-left{

display:flex;
align-items:center;
gap:15px;

}

.circle-btn{

width:38px;
height:38px;

border-radius:50%;
background:white;
color:#0f2c82;

display:flex;
justify-content:center;
align-items:center;

font-size:18px;

}

.back-btn{

background:white;
color:#0f2c82;

border:none;
padding:10px 16px;

border-radius:12px;
cursor:pointer;

font-weight:600;

transition:.3s;

}

.back-btn:hover{

background:#dbeafe;

}

/* ===== HERO ===== */

.hero{

height:180px;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
linear-gradient(
rgba(15,44,130,.65),
rgba(15,44,130,.65)
),

url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200");

background-size:cover;
background-position:center;

color:white;
text-align:center;

}

.hero h1{

font-size:40px;
margin-bottom:10px;

}

.hero p{

opacity:.9;

}

/* ===== CONTENEDOR ===== */

.container{

width:92%;
margin:auto;

padding:35px 0 120px;

}

/* ===== GRID ===== */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:25px;

}

/* ===== TARJETA ===== */

.card{

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:
translateY(-5px);

}

.card-header{

height:100px;

background:#2563eb;

display:flex;
justify-content:center;
align-items:center;

font-size:40px;
color:white;

}

.card-content{

padding:20px;

}

.card-content h3{

color:#0f2c82;

margin-bottom:15px;

font-size:22px;

}

.info{

color:#64748b;

line-height:2;

}

/* ===== VACIO ===== */

.empty{

display:none;
flex-direction:column;

align-items:center;

margin-top:60px;

text-align:center;

}

.empty img{

width:250px;
margin-bottom:20px;

}

.empty p{

font-size:25px;
color:#64748b;

}

/* ===== NAVBAR ===== */

.bottom-nav{

position:fixed;
bottom:0;
left:0;
right:0;

height:75px;
background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -2px 10px rgba(0,0,0,.08);

z-index:999;

}

.bottom-nav a{

text-decoration:none;

color:#6b7280;

display:flex;
flex-direction:column;

align-items:center;

gap:5px;

font-size:13px;

}

.bottom-nav a i{

font-size:22px;

}

.bottom-nav a.active{

color:#2563eb;

}

/* ===== RESPONSIVE ===== */

@media(max-width:768px){

.hero h1{

font-size:32px;

}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="topbar-left">

<div class="circle-btn">

<i class="fa-solid fa-user-graduate"></i>

</div>

<div>

<h2>
Estudiantes
</h2>

<small>
Lista de alumnos inscritos
</small>

</div>

</div>

<button
class="back-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>
Volver

</button>

</div>

<!-- HERO -->

<div class="hero">

<h1>

Estudiantes inscritos

</h1>

<p>

Gestiona los estudiantes de tu clase

</p>

</div>

<!-- CONTENIDO -->

<div class="container">

<div
id="lista"
class="grid">

</div>

<div
id="empty"
class="empty">

<img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png">

<p>

No hay estudiantes inscritos

</p>

</div>

</div>

<!-- NAVBAR -->

<div class="bottom-nav">

<a href="dashboard-docente.html">

<i class="fa-solid fa-house"></i>

Inicio

</a>

<a href="clase.html">

<i class="fa-solid fa-book"></i>

Clases

</a>

<a href="#" class="active">

<i class="fa-solid fa-users"></i>

Estudiantes

</a>

<a href="#">

<i class="fa-regular fa-user"></i>

Perfil

</a>

</div>

<script>

const clase=

new URLSearchParams(
window.location.search
)

.get("id");

fetch(

`http://localhost:3000/api/docente/estudiantes/${clase}`,

{

credentials:"include"

}

)

.then(
r=>r.json()
)

.then(data=>{

const lista=

document.getElementById(
"lista"
);

const empty=

document.getElementById(
"empty"
);

if(
!data.length
){

empty.style.display=
"flex";

return;

}

data.forEach(e=>{

lista.innerHTML+=`

<div class="card">

<div class="card-header">

<i class="fa-solid fa-user-graduate"></i>

</div>

<div class="card-content">

<h3>

${e.nombre}

</h3>

<div class="info">

<p>

📧 ${e.correo}

</p>

<p>

🎓 ${e.grado}

</p>

<p>

🏫 ${e.seccion}

</p>

</div>

</div>

</div>

`;

});

});

</script>

</body>
</html>
