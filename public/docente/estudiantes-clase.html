<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Estudiantes</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4fb;
min-height:100vh;
}

.topbar{

background:#0f2c82;
color:white;

padding:15px 25px;

display:flex;
justify-content:space-between;
align-items:center;
}

.hero{

height:150px;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
rgba(15,44,130,.6),
rgba(15,44,130,.6)
),

url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200");

background-size:cover;

color:white;

}

.hero h1{

font-size:35px;

}

.container{

width:92%;
margin:auto;

padding:30px;

}

.grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:20px;

}

.card{

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

}

.card-header{

height:90px;

background:#2563eb;

display:flex;

justify-content:center;
align-items:center;

font-size:35px;
color:white;

}

.card-content{

padding:15px;

}

.card-content h3{

margin-bottom:10px;

}

.info{

color:#64748b;
line-height:1.7;

}

.empty{

display:none;

flex-direction:column;
align-items:center;

margin-top:60px;

text-align:center;

}

.empty img{

width:250px;

}

.empty p{

margin-top:20px;
font-size:25px;

}

@media(max-width:768px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

@media(max-width:500px){

.grid{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div class="topbar">

<h2>
Estudiantes
</h2>

<button
onclick="history.back()">

Volver

</button>

</div>


<div class="hero">

<h1>

Estudiantes inscritos

</h1>

</div>


<div class="container">

<div
id="lista"
class="grid">

</div>


<div
id="empty"
class="empty">

<img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png">

<p>

No hay estudiantes inscritos

</p>

</div>

</div>

<script>

const clase=

new URLSearchParams(
window.location.search
)

.get("id");


fetch(

`http://localhost:3000/api/docente/estudiantes/${clase}`,

{

credentials:"include"

}

)

.then(
r=>r.json()
)

.then(data=>{

const lista=

document.getElementById(
"lista"
);

const empty=

document.getElementById(
"empty"
);

if(
!data.length
){

empty.style.display=
"flex";

return;

}

data.forEach(e=>{

lista.innerHTML+=`

<div class="card">

<div class="card-header">

<i class="fa-solid fa-user-graduate"></i>

</div>

<div class="card-content">

<h3>

${e.nombre}

</h3>

<div class="info">

<p>

Correo:

${e.correo}

</p>

<p>

Grado:

${e.grado}

</p>

<p>

Sección:

${e.seccion}

</p>

</div>

</div>

</div>

`;

});

});

</script>

</body>
</html>
