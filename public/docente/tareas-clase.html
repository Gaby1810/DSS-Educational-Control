<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tareas</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* ====== (tu CSS se mantiene igual, no lo rompo) ====== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#eef4fb;min-height:100vh;}
.topbar{background:#0f2c82;height:75px;padding:15px 25px;display:flex;justify-content:space-between;align-items:center;color:white;}
.hero{width:100%;height:160px;background:linear-gradient(rgba(15,44,130,.7),rgba(15,44,130,.7)),url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3");background-size:cover;display:flex;justify-content:space-between;align-items:center;padding:0 60px;color:white;}
.container{width:92%;margin:auto;padding:35px 0 100px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.task-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.08);}
.task-image{width:100%;height:120px;object-fit:cover;}
.task-content{padding:15px;}
.task-title{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.task-icon{width:35px;height:35px;border-radius:10px;background:#dbeafe;display:flex;align-items:center;justify-content:center;color:#2563eb;}
.buttons{display:flex;gap:8px;margin-top:12px;}
.buttons button{flex:1;padding:8px;border:none;border-radius:10px;color:white;cursor:pointer;font-size:12px;}
.btn-grade{background:#3b82f6;}
.btn-view{background:#2563eb;}
.empty-state{text-align:center;display:none;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;}
.modal-content{background:white;padding:30px;width:450px;border-radius:20px;}
.modal-content input,.modal-content textarea{width:100%;padding:12px;margin-bottom:15px;border-radius:10px;border:1px solid #ccc;}
</style>

</head>

<body>

<div class="topbar">
<h2>Tareas</h2>
<button onclick="history.back()">Salir</button>
</div>

<div class="hero">
<h1>Tareas</h1>

<div class="create-task" onclick="abrirModal()">
Crear tarea <i class="fa fa-plus"></i>
</div>

</div>

<div class="container">

<div id="contenedor" class="grid"></div>

<div id="empty" class="empty-state">
<h2>No hay tareas</h2>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<h2>Crear tarea</h2>

<input id="titulo" placeholder="Título">
<textarea id="descripcion" placeholder="Descripción"></textarea>
<input type="datetime-local" id="fecha">
<input type="number" id="puntaje" placeholder="Puntaje">
<input type="file" id="archivo">

<button onclick="guardar()">Publicar</button>
<button onclick="cerrarModal()">Cancelar</button>

</div>

</div>

<script>

const id = new URLSearchParams(location.search).get("id");

function abrirModal(){
modal.style.display = "flex";
}

function cerrarModal(){
modal.style.display = "none";
}

// =====================================
// ✅ CREAR TAREA (FIXED)
// =====================================
function guardar(){

const form = new FormData();
form.append("titulo", titulo.value);
form.append("descripcion", descripcion.value);
form.append("fecha_entrega", fecha.value);
form.append("puntaje", puntaje.value);

if(archivo.files[0]){
form.append("archivo", archivo.files[0]);
}

fetch(`http://localhost:3000/api/tareas/crear/${id}`, {
method: "POST",
body: form
})
.then(r => r.json())
.then(res => {
alert(res.message);
location.reload();
});
}

// =====================================
// ✅ CARGAR TAREAS (FIXED)
// =====================================
function cargar(){

fetch(`http://localhost:3000/api/tareas/${id}`)
.then(r => r.json())
.then(data => {

contenedor.innerHTML = "";

if(!data || data.length === 0){
empty.style.display = "block";
return;
}

empty.style.display = "none";

const imgs = [
"https://images.unsplash.com/photo-1513258496099-48168024aec0",
"https://images.unsplash.com/photo-1509062522246-3755977927d7",
"https://images.unsplash.com/photo-1522202176988-66273c2fd55f"
];

data.forEach((t,i) => {

contenedor.innerHTML += `
<div class="task-card">

<img class="task-image" src="${imgs[i % 3]}">

<div class="task-content">

<div class="task-title">
<div class="task-icon"><i class="fa fa-book"></i></div>
<h3>${t.titulo}</h3>
</div>

<p>📅 ${t.fecha_entrega ? new Date(t.fecha_entrega).toLocaleString() : "Sin fecha"}</p>
<p>⭐ ${t.valor || 10} puntos</p>

<p>📌 Entregados: ${t.entregados || 0}</p>
<p>⏳ Pendientes: ${t.pendientes || 0}</p>

<div class="buttons">
<button class="btn-grade"
onclick="location.href='calificar.html?tarea=${t.id}'">
Calificar
</button>
</div>

</div>
</div>
`;
});

});
}

window.onload = cargar;

</script>

</body>
</html>
