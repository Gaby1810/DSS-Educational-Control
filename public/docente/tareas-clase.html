<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Tareas</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4fb;
min-height:100vh;
}

/* TOPBAR */

.topbar{

background:#0f2c82;
height:75px;

padding:15px 25px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;
}

.topbar-left{

display:flex;
align-items:center;
gap:12px;

}

.circle-btn{

width:36px;
height:36px;

border-radius:50%;

background:white;
color:#0f2c82;

display:flex;
align-items:center;
justify-content:center;

}

.logout-btn{

background:white;
border:none;

padding:10px 15px;

border-radius:10px;

cursor:pointer;

font-weight:600;

}

/* HERO */

.hero{

width:100%;
height:160px;

background:

linear-gradient(
rgba(15,44,130,.7),
rgba(15,44,130,.7)
),

url(
"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200"
);

background-size:cover;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 60px;

color:white;

}

.hero h1{

font-size:38px;

}

.create-task{

display:flex;
align-items:center;

gap:10px;

cursor:pointer;

}

.plus-btn{

width:45px;
height:45px;

border-radius:50%;

border:3px solid white;

display:flex;
justify-content:center;
align-items:center;

}

/* CONTENEDOR */

.container{

width:92%;
margin:auto;

padding:35px 0 100px;

}

.grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:22px;

}

/* TARJETAS */

.task-card{

background:white;

border-radius:18px;

overflow:hidden;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

transition:.3s;

}

.task-card:hover{

transform:
translateY(-5px);

}

.task-image{

width:100%;
height:120px;

object-fit:cover;

}

.task-content{

padding:15px;

}

.task-title{

display:flex;
align-items:center;
gap:10px;

margin-bottom:10px;

}

.task-icon{

width:35px;
height:35px;

border-radius:10px;

background:#dbeafe;

display:flex;
align-items:center;
justify-content:center;

color:#2563eb;

}

.task-info{

font-size:13px;
line-height:1.7;

color:#4b5563;

}

.buttons{

display:flex;
gap:8px;
margin-top:12px;

}

.buttons button{

flex:1;

padding:8px;

border:none;

border-radius:10px;

color:white;

cursor:pointer;

font-size:12px;

}

.btn-view{

background:#2563eb;

}

.btn-grade{

background:#3b82f6;

}

.btn-delete{

background:#1d4ed8;

}

/* EMPTY */

.empty-state{

text-align:center;
display:none;

}

.empty-state img{

width:220px;

}

.empty-state h2{

margin-top:20px;

color:#0f172a;

}

.empty-state p{

margin-top:10px;

color:#64748b;

}

/* MODAL */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.5);

display:none;

justify-content:center;
align-items:center;

}

.modal-content{

background:white;

padding:30px;

width:450px;

border-radius:20px;

}

.modal-content input,
.modal-content textarea{

width:100%;

padding:12px;

margin-bottom:15px;

border-radius:10px;

border:1px solid #ccc;

}

.modal-buttons{

display:flex;
gap:10px;

}

.modal-buttons button{

flex:1;

padding:12px;

border:none;

border-radius:10px;

color:white;

cursor:pointer;

}

.btn-save{

background:#2563eb;

}

.btn-cancel{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="topbar">

<div class="topbar-left">

<div class="circle-btn">

<i class="fa-solid fa-book"></i>

</div>

<div>

<h2>Tareas</h2>
<small>Educational Control</small>

</div>

</div>

<button
class="logout-btn">

Salir

</button>

</div>


<div class="hero">

<h1>Tareas</h1>

<div
class="create-task"
onclick="abrirModal()">

<span>

Crear tarea

</span>

<div class="plus-btn">

<i class="fa-solid fa-plus"></i>

</div>

</div>

</div>


<div class="container">

<div
id="contenedor"
class="grid">
</div>

<div
id="empty"
class="empty-state">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png">

<h2>

No has creado ninguna tarea

</h2>

<p>

Crea una tarea para comenzar

</p>

</div>

</div>


<div
class="modal"
id="modal">

<div class="modal-content">

<h2>

Crear tarea

</h2>

<input
id="titulo"
placeholder="Título">

<textarea
id="descripcion"
placeholder="Descripción">
</textarea>

<input
type="datetime-local"
id="fecha">

<input
type="number"
id="puntaje"
placeholder="Puntaje">

<input
type="file"
id="archivo">

<div class="modal-buttons">

<button
class="btn-save"
onclick="guardar()">

Publicar

</button>

<button
class="btn-cancel"
onclick="cerrarModal()">

Cancelar

</button>

</div>

</div>

</div>


<script>

const id=
new URLSearchParams(
location.search
).get("id");


function abrirModal(){

modal.style.display=
"flex";

}

function cerrarModal(){

modal.style.display=
"none";

}


function guardar(){

const form=
new FormData();

form.append(
"titulo",
titulo.value
);

form.append(
"descripcion",
descripcion.value
);

form.append(
"fecha_entrega",
fecha.value
);

form.append(
"puntaje",
puntaje.value
);

if(
archivo.files[0]
){

form.append(
"archivo",
archivo.files[0]
);

}

fetch(

`http://localhost:3000/api/tareas/crear/${id}`,

{

method:"POST",
body:form

}

)

.then(r=>r.json())

.then(()=>{

location.reload();

});

}



function cargar(){

fetch(

`http://localhost:3000/api/tareas/${id}`

)

.then(r=>r.json())

.then(data=>{

contenedor.innerHTML="";

if(data.length===0){

empty.style.display=
"block";

return;

}

empty.style.display=
"none";

const imagenes=[

"https://images.unsplash.com/photo-1513258496099-48168024aec0?q=80&w=1000",

"https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=1000",

"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1000"

];

data.forEach((t,index)=>{

contenedor.innerHTML+=`

<div class='task-card'>

<img
src='${imagenes[index%3]}'
class='task-image'>

<div class='task-content'>

<div class='task-title'>

<div class='task-icon'>

<i class='fa-solid fa-book'></i>

</div>

<h3>

${t.titulo}

</h3>

</div>

<div class='task-info'>

<p>
📅 ${new Date(t.fecha_entrega).toLocaleString()}
</p>

<p>
⭐ ${t.valor} puntos
</p>

<p>
✅ ${t.entregados}
</p>

<p>
⏳ ${t.pendientes}
</p>

</div>

<div class='buttons'>

<button
class='btn-grade'
onclick="location.href='calificar.html?tarea=${t.id}'">

Calificar

</button>

</div>

</div>

</div>

`;

});

});

}

window.onload=
cargar;

</script>

</body>
</html>
