<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Clases - Estudiante</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4fb;
}

.topbar{
background:#0d2b7e;
height:90px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.left-top{
display:flex;
align-items:center;
gap:15px;
}

.notification{
font-size:24px;
}

.container{
padding:25px;
padding-bottom:120px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title-row h1{
font-size:42px;
color:#1f2937;
}

.join-class{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
cursor:pointer;
}

.plus-btn{
width:40px;
height:40px;
border-radius:50%;
border:3px solid #0d2b7e;
color:#0d2b7e;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.3s;
}

.plus-btn:hover{

background:#0d2b7e;
color:white;

}

/* CARDS */

.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;

}

.card{

background:white;
border-radius:20px;
overflow:hidden;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

cursor:pointer;
transition:.3s;

}

.card:hover{

transform:
translateY(-5px);

box-shadow:
0 8px 25px rgba(0,0,0,.15);

}

.card-header{

height:100px;
background:#2563eb;

display:flex;
justify-content:center;
align-items:center;

font-size:35px;
color:white;

}

.card-content{

padding:15px;

}

.card-content h3{

margin-bottom:10px;
color:#111827;

}

.card-content p{

margin-top:6px;
color:#4b5563;

}

.codigo{

margin-top:10px;
font-size:12px;

color:#2563eb;
font-weight:bold;

}

/* EMPTY */

.empty{

display:none;

flex-direction:column;
align-items:center;

margin-top:60px;

text-align:center;

}

.empty img{

width:250px;

}

.empty p{

font-size:25px;
margin-top:20px;

}

/* MODAL */

.modal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.5);

justify-content:center;
align-items:center;

z-index:999;

}

.modal-content{

background:white;

width:90%;
max-width:400px;

padding:30px;

border-radius:20px;

}

.modal-content h2{

margin-bottom:20px;

}

.modal-content input{

width:100%;
padding:12px;

border-radius:10px;

border:1px solid #ccc;

margin-bottom:15px;

}

.modal-buttons{

display:flex;
gap:10px;

}

.modal-buttons button{

flex:1;
padding:12px;

border:none;
border-radius:10px;

cursor:pointer;
color:white;

}

.btn-unir{

background:#2563eb;

}

.btn-cancelar{

background:#64748b;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
right:0;

height:75px;
background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -2px 10px rgba(0,0,0,.08);

}

.bottom-nav a{

text-decoration:none;
color:#6b7280;

display:flex;
flex-direction:column;
align-items:center;

}

.bottom-nav a i{

font-size:22px;

}

.active{

color:#2563eb!important;

}

/* RESPONSIVE */

@media(max-width:768px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

@media(max-width:500px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="topbar">

<div class="left-top">

<h2>
Mis Clases
</h2>

</div>

<div class="notification">

<i class="fa-regular fa-bell"></i>

</div>

</div>


<div class="container">

<div class="title-row">

<h1>
Clases
</h1>

<div
class="join-class"
onclick="abrirModal()">

<span>

Unirse a clase

</span>

<div class="plus-btn">

<i class="fa-solid fa-plus"></i>

</div>

</div>

</div>


<div
id="clases"
class="grid">

</div>


<div
id="empty"
class="empty">

<img src="https://cdn-icons-png.flaticon.com/512/4207/4207247.png">

<p>

Únete a una clase nueva

</p>

</div>

</div>


<!-- MODAL -->

<div
class="modal"
id="modal">

<div class="modal-content">

<h2>

Unirse a clase

</h2>

<input
id="codigo"
placeholder="Ingresa el código">

<div class="modal-buttons">

<button
class="btn-unir"
onclick="unirse()">

Unirse

</button>

<button
class="btn-cancelar"
onclick="cerrarModal()">

Cancelar

</button>

</div>

</div>

</div>


<!-- NAV -->

<div class="bottom-nav">

<a href="dashboard.html">

<i class="fa-solid fa-house"></i>

Inicio

</a>

<a href="#" class="active">

<i class="fa-solid fa-book"></i>

Clases

</a>

<a href="estudiantes.html">

<i class="fa-solid fa-users"></i>

Estudiantes

</a>

<a href="perfil.html">

<i class="fa-regular fa-user"></i>

Perfil

</a>

</div>


<script>

cargarClases();

function abrirModal(){

document
.getElementById(
"modal"
)
.style.display="flex";

}

function cerrarModal(){

document
.getElementById(
"modal"
)
.style.display="none";

}


function unirse(){

const codigo=

document
.getElementById(
"codigo"
)
.value;

fetch(

"/estudiante/unirse",

{

method:"POST",

credentials:"include",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

codigo

})

}

)

.then(
r=>r.json()
)

.then(data=>{

alert(
data.message
);

cerrarModal();

cargarClases();

});

}


function cargarClases(){

fetch(

"/estudiante/mis-clases",

{

credentials:"include"

}

)

.then(
r=>r.json()
)

.then(data=>{

const contenedor=

document.getElementById(
"clases"
);

const empty=

document.getElementById(
"empty"
);

contenedor.innerHTML="";

if(data.length==0){

empty.style.display=
"flex";

return;

}

empty.style.display=
"none";

data.forEach(c=>{

contenedor.innerHTML+=`

<div
class="card"

onclick="
window.location.href=
'detalle-clase.html?id=${c.id}'
">

<div class="card-header">

<i class="fa-solid fa-book"></i>

</div>

<div class="card-content">

<h3>

${c.materia}

</h3>

<p>

Grado:
${c.grado}

</p>

<p>

Sección:
${c.seccion}

</p>

<div class="codigo">

Código:
${c.codigo_clase}

</div>

</div>

</div>

`;

});

});

}

</script>

</body>
</html>
