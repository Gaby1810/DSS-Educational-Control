<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudiantes - Compañeros</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#eef4fb;color:#0f172a;min-height:100vh;}
.topbar{
background:#0f2c82;color:#fff;padding:20px;
display:flex;justify-content:space-between;align-items:center;
}
.topbar h1{font-size:24px;}
.topbar p{font-size:14px;opacity:.86;margin-top:4px;}
.container{padding:24px 24px 110px;}
.summary{
background:#fff;border-radius:24px;padding:24px;margin-bottom:22px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}
.summary h2{font-size:28px;margin-bottom:8px;color:#0f2c82;}
.summary p{color:#64748b;line-height:1.6;}
.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;
}
.card{
background:#fff;border-radius:22px;padding:22px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}
.avatar{
width:58px;height:58px;border-radius:50%;background:#dbeafe;color:#1d4ed8;
display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin-bottom:14px;
}
.card h3{margin-bottom:8px;}
.card p{color:#64748b;line-height:1.6;}
.pill{
display:inline-block;margin-top:12px;padding:6px 10px;border-radius:999px;
background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;
}
.empty{
background:#fff;border-radius:22px;padding:30px;text-align:center;color:#64748b;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;height:75px;background:#fff;
display:flex;justify-content:space-around;align-items:center;
box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:50;
}
.bottom-nav a{
text-decoration:none;color:#6b7280;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:13px;
}
.bottom-nav a i{font-size:22px;}
.bottom-nav a.active{color:#2563eb;}
</style>
</head>
<body>

<div class="topbar">
    <div>
        <h1>Compañeros de clase</h1>
        <p>Consulta a los estudiantes con quienes compartes materias.</p>
    </div>
    <i class="fa-solid fa-users"></i>
</div>

<main class="container">
    <section class="summary">
        <h2>Red académica</h2>
        <p>Esta vista agrupa a los alumnos que coinciden contigo en una o más clases para que tu menú inferior tenga una ruta útil y consistente.</p>
    </section>

    <section id="lista" class="grid"></section>
</main>

<div class="bottom-nav">
    <a href="dashboard.html">
        <i class="fa-solid fa-house"></i>
        Inicio
    </a>
    <a href="clases.html">
        <i class="fa-solid fa-book"></i>
        Clases
    </a>
    <a href="estudiantes.html" class="active">
        <i class="fa-solid fa-users"></i>
        Estudiantes
    </a>
    <a href="perfil.html">
        <i class="fa-regular fa-user"></i>
        Perfil
    </a>
</div>

<script>
fetch("/estudiante/companeros", { credentials: "include" })
    .then(r => r.json())
    .then(data => {
        const lista = document.getElementById("lista");
        if (!Array.isArray(data) || data.length === 0) {
            lista.innerHTML = '<div class="empty">Todavía no tienes compañeros visibles. Esto puede pasar si aún no te unes a clases o si todavía no hay otros estudiantes inscritos.</div>';
            return;
        }

        lista.innerHTML = data.map((estudiante) => `
            <article class="card">
                <div class="avatar">${estudiante.nombre.charAt(0).toUpperCase()}</div>
                <h3>${estudiante.nombre}</h3>
                <p><strong>Correo:</strong> ${estudiante.correo}</p>
                <p><strong>Materias compartidas:</strong> ${estudiante.materias || "No disponible"}</p>
                <span class="pill">${estudiante.clases_compartidas} clases en común</span>
            </article>
        `).join("");
    })
    .catch(() => {
        document.getElementById("lista").innerHTML = '<div class="empty">No fue posible cargar la lista de compañeros en este momento.</div>';
    });
</script>

</body>
</html>
