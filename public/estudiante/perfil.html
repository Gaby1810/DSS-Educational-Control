<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - Estudiante</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#eef4fb;color:#0f172a;min-height:100vh;}
.topbar{background:#0f2c82;color:#fff;padding:22px;}
.topbar h1{font-size:26px;}
.container{width:min(920px,92%);margin:28px auto 110px;}
.card{
background:#fff;border-radius:24px;padding:28px;
box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px;
}
.profile-head{
display:flex;align-items:center;gap:18px;margin-bottom:20px;
}
.avatar{
width:82px;height:82px;border-radius:50%;background:#dbeafe;color:#1d4ed8;
display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;
}
.profile-head h2{font-size:28px;margin-bottom:6px;}
.profile-head p{color:#64748b;}
.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;
}
.item{
background:#f8fafc;border-radius:18px;padding:18px;border:1px solid #e2e8f0;
}
.item small{display:block;color:#64748b;margin-bottom:8px;font-weight:700;}
.item strong{font-size:18px;color:#0f172a;}
.actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:20px;}
.btn{
border:none;border-radius:14px;padding:14px 18px;font-weight:700;cursor:pointer;text-decoration:none;
}
.btn-primary{background:#1d4ed8;color:#fff;}
.btn-secondary{background:#e2e8f0;color:#0f172a;}
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;height:75px;background:#fff;
display:flex;justify-content:space-around;align-items:center;
box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:50;
}
.bottom-nav a{
text-decoration:none;color:#6b7280;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:13px;
}
.bottom-nav a i{font-size:22px;}
.bottom-nav a.active{color:#2563eb;}
</style>
</head>
<body>

<div class="topbar">
    <h1>Mi perfil</h1>
</div>

<main class="container">
    <section class="card">
        <div class="profile-head">
            <div class="avatar" id="avatar">E</div>
            <div>
                <h2 id="nombre">Cargando...</h2>
                <p id="correo">Obteniendo información del estudiante</p>
            </div>
        </div>

        <div class="grid">
            <div class="item">
                <small>Rol</small>
                <strong id="rol">--</strong>
            </div>
            <div class="item">
                <small>Tipo de bachillerato</small>
                <strong id="tipo">--</strong>
            </div>
            <div class="item">
                <small>Año</small>
                <strong id="anio">--</strong>
            </div>
            <div class="item">
                <small>Teléfono</small>
                <strong id="telefono">--</strong>
            </div>
        </div>

        <div class="actions">
            <a class="btn btn-secondary" href="dashboard.html">Volver al inicio</a>
            <button class="btn btn-primary" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </section>
</main>

<div class="bottom-nav">
    <a href="dashboard.html">
        <i class="fa-solid fa-house"></i>
        Inicio
    </a>
    <a href="clases.html">
        <i class="fa-solid fa-book"></i>
        Clases
    </a>
    <a href="estudiantes.html">
        <i class="fa-solid fa-users"></i>
        Estudiantes
    </a>
    <a href="perfil.html" class="active">
        <i class="fa-regular fa-user"></i>
        Perfil
    </a>
</div>

<script>
fetch("/estudiante/dashboard", { credentials: "include" })
    .then(r => r.json())
    .then(data => {
        document.getElementById("avatar").textContent = (data.nombre || "E").charAt(0).toUpperCase();
        document.getElementById("nombre").textContent = data.nombre || "Estudiante";
        document.getElementById("correo").textContent = data.correo || "Sin correo";
        document.getElementById("rol").textContent = data.rol || "estudiante";
        document.getElementById("tipo").textContent = data.tipo_bachillerato || "No definido";
        document.getElementById("anio").textContent = data.anio ? `${data.anio}° año` : "No definido";
        document.getElementById("telefono").textContent = data.telefono || "No registrado";
    });

function cerrarSesion() {
    fetch("/api/auth/logout", { credentials: "include" })
        .then(() => {
            window.location.href = "/login.html";
        });
}
</script>

</body>
</html>
