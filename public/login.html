<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Estudiante</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f172a, #1e3a8a);
}

/* 🔥 HEADER: imagen arriba como banner */
header {
    width: 100%;
    height: 250px;
    background: url('../src/Fondo.png') no-repeat center center;
    background-size: cover;
    position: relative;
}

/* 🔥 CONTENEDOR: saca la card hacia arriba para que se monte sobre el header */
.main {
    display: flex;
    justify-content: center;
    margin-top: -80px;
    padding-bottom: 60px;
    position: relative;
    z-index: 10;
}

/* TARJETA */
.card {
    background: #f9fafb;
    width: 500px;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    text-align: center;
}

h2 {
    margin-bottom: 10px;
}

.subtitle {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 25px;
}

.input-group {
    position: relative;
    margin: 15px 0;
}

.input-group input {
    width: 100%;
    padding: 12px 40px 12px 12px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    outline: none;
    font-size: 14px;
    background: white;
}

.input-group input:focus {
    border-color: #2563eb;
}

.input-group span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border: none;
    border-radius: 14px;
    background: #1e3a8a;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background: #1e40af;
}

.link {
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #2563eb;
    text-decoration: none;
    font-weight: bold;
}

.forgot {
    text-align: right;
    font-size: 12px;
    margin-top: 5px;
}

.forgot a {
    color: #2563eb;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- imagen arriba -->
<header></header>

<!-- card montada encima -->
<div class="main">
    <div class="card">
        <h2>Iniciar sesión Estudiante 👨‍🎓</h2>
        <div class="subtitle">Ingresa tus credenciales para acceder a tu panel escolar</div>

        <div class="input-group">
            <input type="email" id="correo" placeholder="Correo electrónico">
            <span>📧</span>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Contraseña">
            <span>👁️</span>
        </div>

        <div class="forgot">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button onclick="iniciarSesion()">Iniciar sesión</button>

        <div class="link">
            ¿No tienes cuenta? <a href="register.html">Crear cuenta</a>
        </div>
    </div>
</div>
<script>
function iniciarSesion() {

    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:3000/api/auth/login", {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ correo, password })
    })
    .then(res => res.json())
    .then(data => {

        if (data.rol === "docente") {
            window.location.href = "./docente/dashboard.html";
        }

        else if (data.rol === "estudiante") {
            window.location.href = "./estudiante/dashboard.html";
        }

        else {
            alert(data.message);
        }
    })
    .catch(() => alert("Error servidor"));
}

</script>

</body>
</html>
