<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Cuenta</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#0f172a,#072463);
}

/* HEADER */

.header{

width:100%;
height:220px;

background-image:url("../src/Fondo.png");
background-size:cover;
background-repeat:no-repeat;
background-position:70% center;

}

/* CONTENEDOR */

.main{

display:flex;
justify-content:center;
margin-top:-100px;

}

/* CARD */

.card{

background:#f9fafb;
width:500px;
padding:40px;

border-radius:18px;

box-shadow:0 15px 40px rgba(0,0,0,.2);

text-align:center;

}

/* TITULO */

h2{

margin-bottom:10px;

}

.subtitle{

color:#6b7280;
font-size:14px;
margin-bottom:20px;

}

/* ROLES */

.role-switch{

display:flex;

background:#eef1f6;

border-radius:12px;

overflow:hidden;

margin-bottom:20px;

}

.role-switch button{

flex:1;

padding:10px;

border:none;

background:none;

cursor:pointer;

font-weight:bold;

}

.role-switch button.active{

background:#2563eb;
color:white;

}

/* INPUTS */

input,
select{

width:100%;

padding:12px;

margin:10px 0;

border-radius:12px;

border:1px solid #ddd;

outline:none;

}

input:focus,
select:focus{

border-color:#2563eb;

}

/* EXTRA */

.section-box{

background:#eef2ff;

padding:15px;

border-radius:12px;

margin-top:10px;

}

/* BOTÓN */

.primary-btn{

width:100%;

padding:14px;

margin-top:20px;

border:none;

border-radius:14px;

background:#1e3a8a;

color:white;

font-weight:bold;

cursor:pointer;

}

.primary-btn:hover{

background:#1e40af;

}

/* LINK */

.link{

margin-top:15px;

}

.link a{

color:#2563eb;

font-weight:bold;

text-decoration:none;

}

/* VALIDACIONES */

.msg{

font-size:12px;

text-align:left;

margin-top:-5px;

margin-bottom:5px;

color:#ef4444;

}

.ok{

color:green;

}

</style>

</head>

<body>

<div class="header"></div>

<div class="main">

<div class="card">

<h2>Crear Cuenta 👨‍🎓</h2>

<div class="subtitle">

Regístrate para acceder al sistema

</div>

<div class="role-switch">

<button
id="btnEst"
class="active"
onclick="setRol('estudiante')">

Estudiante

</button>

<button
id="btnDoc"
onclick="setRol('docente')">

Docente

</button>

</div>

<input
id="nombre"
placeholder="Nombre completo">

<div
id="msgNombre"
class="msg">

</div>

<input
id="correo"
placeholder="Correo electrónico">

<div
id="msgCorreo"
class="msg">

</div>

<input
id="password"
type="password"
placeholder="Contraseña">

<div
id="msgPass"
class="msg">

</div>

<div id="extra"></div>

<button
class="primary-btn"
onclick="registrar()">

Crear cuenta

</button>

<div class="link">

¿Ya tienes cuenta?

<a href="login.html">

Iniciar sesión

</a>

</div>

</div>

</div>

<script>

let rol="estudiante";

const extra=document.getElementById("extra");

/* ==========================
CAMBIO DE ROL
========================== */

function setRol(r){

rol=r;

document.getElementById("btnEst")
.classList.remove("active");

document.getElementById("btnDoc")
.classList.remove("active");

if(r==="estudiante"){

document.getElementById("btnEst")
.classList.add("active");

extra.innerHTML=`

<div class="section-box">

<select id="tipo_bachillerato">

<option value="">
Tipo Bachillerato
</option>

<option value="Tecnico">
Técnico
</option>

<option value="General">
General
</option>

</select>

<select id="anio">

<option value="">
Año
</option>

<option value="1">1° Año</option>
<option value="2">2° Año</option>
<option value="3">3° Año</option>

</select>

</div>

`;

}

if(r==="docente"){

document.getElementById("btnDoc")
.classList.add("active");

extra.innerHTML=`

<div class="section-box">

<input
id="dui"
placeholder="DUI (12345678-9)">

<div
id="msgDui"
class="msg">

</div>

<input
id="telefono"
placeholder="Teléfono">

</div>

`;

}

}

setRol("estudiante");

/* ==========================
VALIDACIONES
========================== */

document.addEventListener("input",()=>{

validarNombre();
validarCorreo();
validarPass();
validarDui();

});

function validarNombre(){

let v=
document.getElementById("nombre").value;

msgNombre.innerHTML=

v.length<3

?"Nombre muy corto"

:'<span class="ok">✓ Correcto</span>';

}

function validarCorreo(){

let r=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

msgCorreo.innerHTML=

!r.test(correo.value)

?"Correo inválido"

:'<span class="ok">✓ Correcto</span>';

}

function validarPass(){

let r=
/^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

msgPass.innerHTML=

!r.test(password.value)

?"Debe tener mayúscula, número y símbolo"

:'<span class="ok">✓ Segura</span>';

}

function validarDui(){

let d=document.getElementById("dui");

if(!d)return;

let regex=/^\d{8}-\d$/;

let msg=document.getElementById("msgDui");

msg.innerHTML=

!regex.test(d.value)

?"Formato:12345678-9"

:'<span class="ok">✓ Correcto</span>';

}

/* ==========================
REGISTRO
========================== */

function registrar(){

const data={

nombre:nombre.value,

correo:correo.value,

password:password.value,

rol:rol,

dui:
document.getElementById("dui")?.value,

tipo_bachillerato:
document.getElementById("tipo_bachillerato")?.value,

anio:
document.getElementById("anio")?.value,

telefono:
document.getElementById("telefono")?.value

};

fetch(
"http://localhost:3000/api/auth/register",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

}

)

.then(r=>r.json())

.then(data=>{

alert(data.message);

if(
data.message.includes("correctamente")
){

location.href="login.html";

}

})

.catch(()=>{

alert(
"Error servidor"
);

});

}

</script>

</body>
</html>
