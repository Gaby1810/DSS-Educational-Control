<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Cuenta</title>

<style>

/* RESET */
*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f172a, #1e3a8a);
}

/* HEADER */
.header{
    width:100%;
    height:220px;
    background-image:url("../src/Fondo.png");
    background-size:cover;
    background-repeat:no-repeat;
    background-position:70% center;
}

/* CONTENEDOR */
.main{
    display:flex;
    justify-content:center;
    margin-top:-100px;
}

/* CARD */
.card{
    background:#f9fafb;
    width:500px;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
}

/* TITULO */
h2{
    margin-bottom:10px;
}

.subtitle{
    color:#6b7280;
    font-size:14px;
    margin-bottom:20px;
}

/* ROLES */
.role-switch{
    display:flex;
    background:#eef1f6;
    border-radius:12px;
    margin-bottom:20px;
    overflow:hidden;
}

.role-switch button{
    flex:1;
    padding:10px;
    border:none;
    background:none;
    cursor:pointer;
    font-weight:bold;
}

.role-switch button.active{
    background:#2563eb;
    color:white;
}

/* INPUTS */
input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ddd;
    outline:none;
}

input:focus, select:focus{
    border-color:#2563eb;
}

/* SECCION EXTRA */
.section-box{
    background:#eef2ff;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

/* BOTON */
button.primary-btn{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:14px;
    background:#1e3a8a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button.primary-btn:hover{
    background:#1e40af;
}

/* LINK */
.link{
    margin-top:15px;
}

.link a{
    color:#2563eb;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header"></div>

<!-- CARD -->
<div class="main">
<div class="card">

<h2>Crear Cuenta 👨‍🎓</h2>
<div class="subtitle">Regístrate para acceder al sistema</div>

<div class="role-switch">
    <button id="btnEst" class="active" onclick="setRol('estudiante')">Estudiante</button>
    <button id="btnDoc" onclick="setRol('docente')">Docente</button>
    <button id="btnAdmin" onclick="setRol('admin')">Admin</button>
</div>

<input type="text" id="nombre" placeholder="Nombre completo">
<input type="email" id="correo" placeholder="Correo institucional">
<input type="password" id="password" placeholder="Contraseña">

<div id="extra"></div>

<button type="button" class="primary-btn" onclick="registrar()">Crear cuenta</button>

<div class="link">
    ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
</div>

</div>
</div>
<script>

let rolSeleccionado = "estudiante";

function setRol(rol) {

    rolSeleccionado = rol;

    document.getElementById("btnEst").classList.remove("active");
    document.getElementById("btnDoc").classList.remove("active");
    document.getElementById("btnAdmin").classList.remove("active");

    if (rol === "estudiante")
        document.getElementById("btnEst").classList.add("active");

    if (rol === "docente")
        document.getElementById("btnDoc").classList.add("active");

    if (rol === "admin")
        document.getElementById("btnAdmin").classList.add("active");

    mostrarCampos();
}

function mostrarCampos() {

    const extra = document.getElementById("extra");

    if (rolSeleccionado === "estudiante") {

        extra.innerHTML = `
        <div class="section-box">

            <select id="grado">
                <option value="">Seleccione grado</option>
                <option value="1">1°</option>
                <option value="2">2°</option>
                <option value="3">3°</option>
            </select>

            <input
                type="text"
                id="seccion"
                placeholder="Sección"
            >

            <select id="turno">
                <option value="">Turno</option>
                <option value="Matutino">Matutino</option>
                <option value="Vespertino">Vespertino</option>
            </select>

        </div>
        `;
    }

    else if (rolSeleccionado === "docente") {

        extra.innerHTML = `
        <div class="section-box">

            <input
                type="text"
                id="materia_principal"
                placeholder="Materia principal"
            >

            <input
                type="text"
                id="telefono"
                placeholder="Teléfono"
            >

        </div>
        `;
    }

    else {

        extra.innerHTML = `
        <div class="section-box">

            <input
                type="password"
                id="codigo_admin"
                placeholder="Código admin"
            >

        </div>
        `;
    }

}

mostrarCampos();

function registrar() {

    const nombre =
    document.getElementById("nombre").value;

    const correo =
    document.getElementById("correo").value;

    const password =
    document.getElementById("password").value;

    let datosExtra = {};

    // ESTUDIANTE
    if (rolSeleccionado === "estudiante") {

        datosExtra = {

            grado:
            document.getElementById("grado").value,

            seccion:
            document.getElementById("seccion").value,

            turno:
            document.getElementById("turno").value

        };

    }

    // DOCENTE
    if (rolSeleccionado === "docente") {

        datosExtra = {

            materia_principal:
            document.getElementById("materia_principal").value,

            telefono:
            document.getElementById("telefono").value

        };

    }

    fetch(
        "http://localhost:3000/api/auth/register",
        {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            credentials: "include",

            body: JSON.stringify({

                nombre,
                correo,
                password,

                rol: rolSeleccionado,

                ...datosExtra

            })

        }
    )

    .then(res => res.json())

    .then(data => {

        if (
            data.message.includes("correctamente")
        ) {

            alert("Usuario creado");

            window.location.href = "login.html";

        }

        else {

            alert(data.message);

        }

    });

}

</script>
</body>
</html>
